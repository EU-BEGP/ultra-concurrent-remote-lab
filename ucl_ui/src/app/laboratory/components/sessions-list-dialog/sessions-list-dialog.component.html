<mat-card-title class="dialog-title">
    <span class="first-title header2">Saved</span>
    <span class="second-title header2">Sessions</span>
</mat-card-title>

<mat-dialog-content class="mat-typography">
    <div *ngIf="!no_sessions_data">
        <mat-grid-list [cols]="breakpoint" rowHeight="72px"
            (window:resize)="onResize($event)">
            <mat-grid-tile>
                <span mat-caption class="input-label header3"> Search by
                    Name, Laboratory or
                    Date </span>
            </mat-grid-tile>
            <mat-grid-tile>
                <mat-form-field class="input-field"
                    appearance="outline">
                    <input matInput (keyup)="applyFilter($event)"
                        placeholder="Name, Laboratory or
                        Date"
                        #input required>
                </mat-form-field>
            </mat-grid-tile>
        </mat-grid-list>

        <table mat-table [dataSource]="dataSource" class="demo-table" matSort>

            <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef mat-sort-header
                    class="header3 table-header">
                    Name </th>
                <td mat-cell *matCellDef="let element" class="body">
                    {{element.name}} </td>
            </ng-container>

            <ng-container matColumnDef="laboratory">
                <th mat-header-cell *matHeaderCellDef mat-sort-header
                    class="header3 table-header">
                    Laboratory </th>
                <td mat-cell *matCellDef="let element" class="body">
                    {{element.laboratory}} </td>
            </ng-container>

            <ng-container matColumnDef="registration_date">
                <th mat-header-cell *matHeaderCellDef mat-sort-header
                    class="header3 table-header">
                    Date
                </th>
                <td mat-cell *matCellDef="let element" class="body">
                    {{element.registration_date}}
                </td>
            </ng-container>

            <ng-container matColumnDef="registration_time">
                <th mat-header-cell *matHeaderCellDef mat-sort-header
                    class="header3 table-header">
                    Time
                </th>
                <td mat-cell *matCellDef="let element" class="body">
                    {{element.registration_time}}
                </td>
            </ng-container>

            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef
                    class="header3 table-header">
                </th>
                <td mat-cell *matCellDef="let element"
                    class=" buttons-cell actions-column">
                    <button mat-menu-item (click)="redirectTo(element.id)"
                        mat-dialog-close>
                        <span class="header3"> Load Session</span>
                        <mat-icon
                            class="accent bigger-icon ml-24">open_in_new</mat-icon>
                    </button>
                    <button mat-menu-item
                        (click)="openConfirmationDialog(element.id, element.name)"
                        matTooltip="Delete Laboratory">
                        <span class="header3">
                            Delete</span>
                        <mat-icon
                            class="error bigger-icon ml-24">close</mat-icon>
                    </button>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

            <tr class="mat-row" *matNoDataRow>
                <td class="mat-cell" colspan="4"><span class="body"> No
                        data
                        matching the filter
                        "{{input.value}}"</span></td>
            </tr>

        </table>

        <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]"></mat-paginator>
    </div>

    <div *ngIf="no_sessions_data" class="center">
        <span class="body center mb-16"> You don't have any Saved Session
        </span>
    </div>
</mat-dialog-content>
<mat-dialog-actions align="end">
    <button mat-dialog-close type="button" mat-raised-button
        class="header2">Close</button>
</mat-dialog-actions>
